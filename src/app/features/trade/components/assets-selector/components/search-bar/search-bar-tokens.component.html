<ng-container>
  <tui-input
    *ngIf="!expandableField; else expandableInputTpl"
    [ngModel]="localQuery"
    (ngModelChange)="onQueryChanges($event)"
    [tuiTextfieldIconLeft]="'@tui.search'"
    [tuiTextfieldSize]="'m'"
    [tuiTextfieldLabelOutside]="true"
    [focusable]="false"
  >
    {{ searchBarPlaceholder | translate }}
  </tui-input>

  <ng-template #expandableInputTpl>
    <div class="expandable-input" [class.expandable-input_expanded]="isExpanded" (click)="expand()">
      <tui-input
        [ngModel]="localQuery"
        (ngModelChange)="onQueryChanges($event)"
        [tuiTextfieldIcon]="'@tui.search'"
        tuiTextfieldSize="l"
        [tuiTextfieldCleaner]="true"
      >
        {{ 'modals.tokensListModal.searchPlaceholder' | translate }}
      </tui-input>
    </div>
  </ng-template>
</ng-container>
