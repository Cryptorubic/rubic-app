<app-window-container>
  <ng-container header>Import account</ng-container>
  <form [formGroup]="secretForm" (ngSubmit)="handleConfirm()">
    <p>Your wallet data is encrypted using your hash and stored securely in your browser.</p>

    <tui-input-password formControlName="mnemonic">
      Seed phrase
      <span class="tui-required"></span>
    </tui-input-password>
    <tui-error
      formControlName="mnemonic"
      [error]="['required', 'mnemonic'] | tuiFieldError | async"
    ></tui-error>

    <tui-input-password formControlName="password">
      Password
      <span class="tui-required"></span>
    </tui-input-password>
    <tui-error
      formControlName="password"
      [error]="['required'] | tuiFieldError | async"
    ></tui-error>

    <tui-notification [size]="'m'" [appearance]="'info'">
      This feature is in beta. Importing your seed phrase carries risk. Please use only wallets with
      limited funds.
    </tui-notification>

    <div></div>

    <div class="buttons">
      <button type="submit" size="l" tuiButton class="tui-form__button">Confirm</button>
    </div>
  </form>
</app-window-container>
