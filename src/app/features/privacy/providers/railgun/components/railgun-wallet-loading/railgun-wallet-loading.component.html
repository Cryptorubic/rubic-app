<app-window-container
  *ngLet="{ poiLoading: poiLoading$ | async, poiProgress: poiProgress$ | async } as data"
>
  <ng-container header>Balance Sync</ng-container>
  <div [@fadeAnimation] *ngIf="scanInProgress || data.poiLoading" class="progress">
    <ng-container *ngIf="scanInProgress">
      <ng-container *ngFor="let value of utxoChains; trackBy: trackByFn">
        <label tuiProgressLabel>
          <img class="progress__image" [src]="value.icon" [alt]="value.label" />
          <span class="progress__percent">{{ value.progress }}%</span>

          <tui-progress-circle
            size="l"
            [max]="100"
            [value]="value.progress"
            [style.color]="value.color"
          ></tui-progress-circle>
        </label>
      </ng-container>
    </ng-container>
    <ng-container *ngIf="data.poiLoading">
      <label tuiProgressLabel>
        <span>POI</span>
        <span class="progress__percent">Scan</span>

        <tui-progress-circle size="l" [max]="10" [value]="data.poiProgress"></tui-progress-circle>
      </label>
    </ng-container>
  </div>
</app-window-container>
