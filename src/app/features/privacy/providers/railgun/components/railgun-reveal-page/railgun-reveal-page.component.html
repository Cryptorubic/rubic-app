<app-reveal-window
  (handleReveal)="reveal($event)"
  [receiverCtrl]="receiverCtrl"
  [creationConfig]="{
    withActionButton: true,
    withReceiver: false,
    withSrcAmount: true,
    withMaxBtn: true,
    showPresets: true,
    showWarnings: true,
    receiverPlaceholder: 'Enter receiver’s EVM wallet address',
    assetsSelectorConfig: {
      withChainsFilter: false,
      withTokensFilter: false,
      withFavoriteTokens: false,
      showAllChains: false
    }
  }"
></app-reveal-window>
