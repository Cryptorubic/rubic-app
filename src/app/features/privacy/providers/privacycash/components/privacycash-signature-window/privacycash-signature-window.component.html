<div class="signature-window-wrapper">
  <ng-container *ngIf="(authorized$ | async) === false; else authorized">
    <b>
      Sign a message with your wallet <br />
      to access your private balance
    </b>
    <button tuiButton type="button" size="m" appearance="primary" (click)="signMessage()">
      Sign
    </button>
  </ng-container>
  <ng-template #authorized>
    <b> You logged in successfully.</b>
  </ng-template>
</div>
