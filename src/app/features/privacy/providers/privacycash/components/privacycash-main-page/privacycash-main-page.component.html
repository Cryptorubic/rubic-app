<div
  *ngLet="{
    step: currentStep$ | async,
    disabledPages: disabledPages$ | async
  } as data"
  class="container"
>
  <app-page-navigation
    [pages]="steps"
    [activePage]="data.step"
    [disabledPages]="data.disabledPages"
    (onSelect)="onStepChange($event)"
  ></app-page-navigation>

  <div class="main">
    <app-privacycash-signature-window
      *ngIf="data.step.type === 'login'"
    ></app-privacycash-signature-window>

    <app-privacycash-hide-page *ngIf="data.step.type === 'hide'"></app-privacycash-hide-page>

    <app-privacycash-swap-page *ngIf="data.step.type === 'swap'"></app-privacycash-swap-page>

    <app-privacycash-reveal-page *ngIf="data.step.type === 'reveal'"></app-privacycash-reveal-page>

    <app-privacycash-transfer-page
      *ngIf="data.step.type === 'transfer'"
    ></app-privacycash-transfer-page>

    <app-privacycash-refund-page *ngIf="data.step.type === 'refund'"></app-privacycash-refund-page>
  </div>
</div>
