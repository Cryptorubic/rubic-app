<ng-container
  *ngLet="{
    activePage: activePage$ | async
  } as data"
>
  <div class="wrapper">
    <app-page-navigation
      [activePage]="data.activePage"
      [pages]="pages"
      (onSelect)="onPageSelect($event)"
    ></app-page-navigation>

    <app-clearswap-transfer-tokens-page
      *ngIf="data.activePage.type === 'transfer'"
    ></app-clearswap-transfer-tokens-page>
    <app-clearswap-swap-page *ngIf="data.activePage.type === 'swap'"></app-clearswap-swap-page>
  </div>
</ng-container>
