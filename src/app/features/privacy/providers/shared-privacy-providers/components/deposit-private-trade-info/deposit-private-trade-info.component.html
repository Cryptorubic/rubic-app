<app-window-container
  *ngLet="{
    wallet: walletAddress$ | async,
  } as state"
>
  <ng-container header>Transaction details</ng-container>
  <div *ngIf="tradeInfo" class="transaction-details">
    <app-transaction-details-element
      [title]="text.transactionId.label"
      [description]="text.transactionId.description"
    >
      <div class="row">
        {{ tradeInfo.id }}
        <app-copy-container [text]="tradeInfo.id"></app-copy-container>
      </div>
    </app-transaction-details-element>

    <app-transaction-details-element
      *ngIf="state.wallet && tradeInfo.trade?.to.blockchain"
      [title]="text.receiver.label"
      [description]="text.receiver.description"
    >
      <div class="receiver-container">
        {{ state.wallet | shortAddress : 5 : 5 }}

        <a
          [safetyLink]="
            state.wallet | scannerLink : tradeInfo.trade.to.blockchain : ADDRESS_TYPE.WALLET
          "
        >
          <img
            class="image"
            src="assets/images/icons/scanner.svg"
            [alt]="'common.checkOnScanner' | translate"
          />
        </a>
      </div>
    </app-transaction-details-element>

    <ng-container *ngIf="tradeInfo?.extraField">
      <app-transaction-details-element
        [title]="tradeInfo.extraField.name"
        [description]="tradeInfo.extraField.text"
      >
        <div class="row">
          {{
            tradeInfo.extraField.value.length > 25
              ? (tradeInfo.extraField.value | shortAddress : 10 : 10)
              : tradeInfo.extraField.value
          }}
          <app-copy-container [text]="tradeInfo.extraField.value"></app-copy-container>
        </div>
      </app-transaction-details-element>
    </ng-container>
  </div>
  <tui-notification *ngIf="tradeInfo?.extraField" status="warning" class="tui-space_vertical-4">
    {{ tradeInfo.extraField.text }}
  </tui-notification>

  <ng-template></ng-template>
</app-window-container>
