<ng-container *ngIf="buttonState$ | async as state">
  <button
    tuiButton
    appearance="primary"
    type="button"
    size="m"
    [loading]="showLoader"
    [disabled]="state.type === 'error'"
    (click)="state.type === 'parent' ? onClick.emit() : state.action()"
  >
    {{ state.text }}
  </button>
</ng-container>
