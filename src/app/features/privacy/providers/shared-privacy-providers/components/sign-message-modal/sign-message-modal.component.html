<div class="modal">
  <div class="modal__content">
    <main class="modal__body">
      <img
        class="modal__warning-image"
        src="assets/images/bridge/warning-image.svg"
        alt="Success"
      />
    </main>

    <div class="modal__footer">
      <div class="modal__footer-text">
        signing a message with your wallet to access your private balance
      </div>
      <div class="modal__footer-actions">
        <button
          class="swap-button"
          tuiButton
          appearance="primary"
          type="button"
          size="m"
          (click)="sign()"
          [showLoader]="!!(isSdkLoading$ | async)"
        >
          Sign
        </button>
      </div>
    </div>
  </div>
</div>
