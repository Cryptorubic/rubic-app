<div class="provider-element" (click)="handleClick()">
  <div class="top">
    <div class="top-layer-1">
      <div class="provider-name">
        <img [src]="providerInfo.icon" width="16" height="16" [alt]="'provider-icon'" />
        <b>{{ providerInfo.uiName }}</b>
      </div>
      <div
        *ngIf="providerInfo.warning"
        class="shielding-duration"
        [tuiHint]="providerInfo.warning.hint"
      >
        <b>{{ providerInfo.warning.message }}</b>
        <img
          src="assets/images/private-swaps/common/red-energy.svg"
          width="16"
          height="16"
          [alt]="'hint-icon'"
        />
      </div>
    </div>

    <div class="top-layer-2">
      <div class="privacy-type">
        <img src="assets/images/private-swaps/common/shield.svg" width="15" height="15" />
        <b>{{ providerInfo.privacyType }}</b>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class="execution-time">
      <img src="assets/images/private-swaps/common/time.svg" width="15" height="15" />
      <div
        *ngFor="let count of executionTimeCount"
        inlineSVG="assets/images/private-swaps/common/time-tick.svg"
        [class.active]="count <= providerInfo.executionTimeRate"
        width="9"
        height="16"
      ></div>
    </div>

    <div class="fee-size" [tuiHint]="providerInfo.feeInfo.feeSize">
      <div
        *ngFor="let count of feeRateCount"
        inlineSVG="assets/images/private-swaps/common/dollar.svg"
        [class.active]="count <= providerInfo.feeInfo.feeRate"
        width="9"
        height="16"
      ></div>
    </div>

    <div class="steps" [tuiHint]="providerInfo.executionSteps.hint">
      <div
        [inlineSVG]="
          'assets/images/private-swaps/common/action-step-' +
          providerInfo.executionSteps.steps +
          '.svg'
        "
        width="9"
        height="16"
      ></div>
    </div>

    <!-- <div
      *ngIf="providerInfo.minAmountUsd > 0"
      class="min-amount"
      [tuiHint]="
        'Minimum amount required for a private swap. It may vary depending on the selected token.'
      "
    >
      <b>min ${{ providerInfo.minAmountUsd }}</b>
    </div> -->

    <div
      class="security-percent"
      [tuiHint]="
        'Privacy metric based on data from the Web3Privacy Explorer:
https://explorer.web3privacy.info/'
      "
    >
      <img src="assets/images/private-swaps/common/lock.svg" width="15" height="15" />
      <div class="stars">
        <div
          *ngFor="let count of starsCount"
          inlineSVG="assets/images/private-swaps/common/star.svg"
          [class.active]="providerInfo.security - count > -1"
          [style.--security-offset]="getSecurityOffset(count) + '%'"
          width="9"
          height="9"
        ></div>
      </div>
    </div>
  </div>
</div>
