<div class="header">
  <tui-tabs class="tabs" [underline]="false" size="m" [activeItemIndex]="activeItemIndex$ | async">
    <button tuiTab (click)="onClick(0)">
      <div class="icon" inlineSVG="assets/images/icons/history/cross.svg"></div>
      Cross Chain
    </button>
    <button tuiTab (click)="onClick(1)">
      <div class="icon" inlineSVG="assets/images/icons/history/onchain.svg"></div>
      On Chain
    </button>
    <button tuiTab (click)="onClick(2)">
      <div class="icon" inlineSVG="assets/images/icons/history/deposits.svg"></div>
      Deposits
    </button>
  </tui-tabs>
  <div class="filter">
    <form class="b-form">
      <tui-textfield
        *ngIf="isCrossChain$ | async"
        class="filter__select"
        tuiTextfieldSize="m"
        tuiChevron
      >
        <label tuiLabel>Status</label>
        <input tuiSelect [formControl]="statusFilter" />
        <tui-data-list-wrapper *tuiTextfieldDropdown [items]="items"></tui-data-list-wrapper>
      </tui-textfield>
    </form>
  </div>
</div>
