<div class="modals">
  <h4 class="modals__text">
    {{ walletName }} supports different chain types, such as {{ supportedOptionsText }}. Please
    select the one you wish to use.
  </h4>
  <div class="modals__buttons">
    <button
      *ngFor="let option of walletOptions"
      tuiButton
      appearance="secondary"
      type="button"
      size="m"
      (click)="confirm(option.value)"
      class="modals__button"
    >
      <div class="modals__buttons-content">
        <div class="modals__provider-icon">
          <img src="{{ option.icon }}" alt="{{ option.label }} provider" />
        </div>
        <span>{{ option.label }}</span>
      </div>
    </button>
  </div>
</div>
