<ng-container>
  <div [tuiDropdown]="dropdown" tuiDropdownAlign="right" [(tuiDropdownOpen)]="dropdownIsOpened">
    <div tuiGroup>
      <button tuiButton class="profile-button" appearance="secondary" type="button" size="m">
        <ng-container *ngLet="{ text: profileText$ | async } as profile">
          <div class="user-profile__text">
            {{ profile.text }}
          </div>
        </ng-container>

        <div class="arrow" inlineSVG="assets/images/icons/arrow-down.svg"></div>
      </button>
    </div>
  </div>

  <ng-template #dropdown let-activeZone>
    <app-user-profile-wallets [inMobileMenu]="false"></app-user-profile-wallets>
  </ng-template>
</ng-container>
